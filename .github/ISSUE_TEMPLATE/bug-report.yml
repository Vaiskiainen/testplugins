name: Bug report
description: Report a bug or unexpected behavior
title: "[BUG]: "
labels: ["bug"]
assignees:
  - Vaiskiainen

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below I can fix it.

  - type: input
    id: summary
    attributes:
      label: Bug summary
      description: A short description of the bug
      placeholder: "App crashes when clicking X"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: debug
    attributes:
      label: Debug information
      description: Please paste your /debug output here
      placeholder: |
        **Kettu Debug Info**
        > Kettu: v1.4.2 (KettuXposed 1.3.3)
        > Discord: 313.9 (313009)
        > React: 19.1.0 (RN 0.81.4-discord-31)
        > Hermes: for RN 0.81.4-discord-31 (bcv96)
        > System: Android 14 (SDK 34)
        > Device: SM-A236B (undefined)
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: OS
      description: What operating system are you using??
      options:
        - Android
        - iOS
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I have checked existing issues and this is not a duplicate.
          required: true